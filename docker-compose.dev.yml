services:
  mysql-sir:
    image: mysql:8.0
    container_name: empresarial-mysql-sir
    restart: unless-stopped
    ports:
      - "${SIR_DB_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${SIR_DB_ROOT_PASSWORD:-root_dev}
      MYSQL_DATABASE: ${SIR_DB_NAME:-claroEmpresarial}
      MYSQL_USER: ${SIR_DB_USER:-monitor}
      MYSQL_PASSWORD: ${SIR_DB_PASSWORD:-troque_me}
    volumes:
      - empresarial_mysql_sir_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${SIR_DB_ROOT_PASSWORD:-root_dev}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  empresarial_mysql_sir_data:
